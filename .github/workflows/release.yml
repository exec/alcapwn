name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux — CGO_ENABLED=0 produces fully static binaries (no glibc dep)
          - { name: alcapwn-linux-amd64,   goos: linux,   goarch: amd64,  runner: ubuntu-latest }
          - { name: alcapwn-linux-arm64,   goos: linux,   goarch: arm64,  runner: ubuntu-latest }
          - { name: alcapwn-linux-armv7,   goos: linux,   goarch: arm,    goarm: "7", runner: ubuntu-latest }
          - { name: alcapwn-linux-i386,    goos: linux,   goarch: 386,    runner: ubuntu-latest }
          # macOS — native runners for darwin targets
          - { name: alcapwn-macos-x86_64,  goos: darwin,  goarch: amd64,  runner: macos-latest }
          - { name: alcapwn-macos-aarch64, goos: darwin,  goarch: arm64,  runner: macos-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o dist/alcapwn .
      - name: Package
        run: cd dist && tar -czf ${{ matrix.name }}.tar.gz alcapwn
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

      # Build a .deb for amd64/arm64 Linux only — these are the arches the
      # apt repo at repo.x86-64.com publishes. Triggered on tag pushes; on
      # workflow_dispatch the ref is a branch name and nfpm rejects it.
      - name: Install nfpm
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == 'arm64')
        env:
          NFPM_VERSION: "2.42.1"
        run: |
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xzC /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == 'arm64')
        env:
          REF_NAME: ${{ github.ref_name }}
          DEB_ARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VER="${REF_NAME#v}"
          cat > nfpm.yaml <<EOF
          name: alcapwn
          arch: ${DEB_ARCH}
          version: ${VER}
          maintainer: Dylan Hart
          description: |
            CLI-based C2 framework for CTF and authorized penetration testing.
            Catches reverse shells, upgrades them to PTY, runs automated recon,
            and manages multiple sessions from an interactive operator shell.
          homepage: https://github.com/exec/alcapwn
          section: utils
          priority: optional
          contents:
            - src: dist/alcapwn
              dst: /usr/bin/alcapwn
              file_info:
                mode: 0755
          EOF
          nfpm pkg --packager deb --target dist/
          ls -la dist/*.deb

      - name: Upload .deb artifact
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == 'arm64')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-deb
          path: dist/*.deb

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Generate checksums
        run: |
          cd artifacts
          find . \( -name '*.tar.gz' -o -name '*.deb' \) -exec sha256sum {} + | sed 's|.*/||' > checksums-sha256.txt
          cat checksums-sha256.txt
      - uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.deb
            artifacts/checksums-sha256.txt
          body: |
            ## Install

            ### Homebrew (macOS / Linux)
            ```sh
            brew tap exec/homebrew-tap
            brew install alcapwn
            ```

            ### Direct download
            Download the archive for your platform from the assets below, extract it, and place `alcapwn` somewhere on your `$PATH`.

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux    | x86_64        | `alcapwn-linux-amd64.tar.gz` |
            | Linux    | arm64         | `alcapwn-linux-arm64.tar.gz` |
            | Linux    | armv7         | `alcapwn-linux-armv7.tar.gz` |
            | Linux    | i386          | `alcapwn-linux-i386.tar.gz` |
            | macOS    | Apple Silicon | `alcapwn-macos-aarch64.tar.gz` |
            | macOS    | Intel         | `alcapwn-macos-x86_64.tar.gz` |

            ```sh
            tar -xzf alcapwn-<platform>-<arch>.tar.gz
            sudo mv alcapwn /usr/local/bin/
            ```

  homebrew:
    name: Bump Homebrew formula
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: alcapwn
          homebrew-tap: exec/homebrew-tap
          base-branch: main
          download-url: https://github.com/exec/alcapwn/releases/download/${{ github.ref_name }}/alcapwn-macos-aarch64.tar.gz
          commit-message: "{{formulaName}} {{version}}"
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
