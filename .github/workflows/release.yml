name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: alcapwn-linux-amd64,   goos: linux,   goarch: amd64 }
          - { name: alcapwn-linux-arm64,   goos: linux,   goarch: arm64 }
          - { name: alcapwn-macos-x86_64,  goos: darwin,  goarch: amd64 }
          - { name: alcapwn-macos-aarch64, goos: darwin,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.4"
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-s -w" -o dist/alcapwn .
      - name: Package
        run: cd dist && tar -czf ${{ matrix.name }}.tar.gz alcapwn
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: artifacts/*/*.tar.gz
          body: |
            ## Install

            ### Homebrew (macOS / Linux)
            ```sh
            brew tap exec/homebrew-tap
            brew install alcapwn
            ```

            ### Direct download
            Download the archive for your platform from the assets below, extract it, and place `alcapwn` somewhere on your `$PATH`.

            ```sh
            tar -xzf alcapwn-<platform>-<arch>.tar.gz
            sudo mv alcapwn /usr/local/bin/
            ```

  homebrew:
    name: Bump Homebrew formula
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: alcapwn
          homebrew-tap: exec/homebrew-tap
          base-branch: main
          download-url: https://github.com/exec/alcapwn/releases/download/${{ github.ref_name }}/alcapwn-macos-aarch64.tar.gz
          commit-message: "{{formulaName}} {{version}}"
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
